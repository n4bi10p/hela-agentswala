steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg"
      - "NEXT_PUBLIC_HELA_RPC=${_NEXT_PUBLIC_HELA_RPC}"
      - "--build-arg"
      - "NEXT_PUBLIC_CHAIN_ID=${_NEXT_PUBLIC_CHAIN_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_HLUSD_ADDRESS=${_NEXT_PUBLIC_HLUSD_ADDRESS}"
      - "--build-arg"
      - "NEXT_PUBLIC_AGENT_REGISTRY_ADDRESS=${_NEXT_PUBLIC_AGENT_REGISTRY_ADDRESS}"
      - "--build-arg"
      - "NEXT_PUBLIC_AGENT_ESCROW_ADDRESS=${_NEXT_PUBLIC_AGENT_ESCROW_ADDRESS}"
      - "--build-arg"
      - "NEXT_PUBLIC_AGENT_EXECUTOR_ADDRESS=${_NEXT_PUBLIC_AGENT_EXECUTOR_ADDRESS}"
      - "--build-arg"
      - "NEXT_PUBLIC_PLATFORM_FEE_BPS=${_NEXT_PUBLIC_PLATFORM_FEE_BPS}"
      - "--build-arg"
      - "NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_GEMINI_API_KEY=${_NEXT_PUBLIC_GEMINI_API_KEY}"
      - "-t"
      - "${_IMAGE_URI}"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_IMAGE_URI}"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--image=${_IMAGE_URI}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=1Gi"
      - "--cpu=1"
      - "--max-instances=2"
      - "--set-env-vars=NODE_ENV=production"

images:
  - "${_IMAGE_URI}"

substitutions:
  _SERVICE: "trovia-app"
  _REGION: "asia-south1"
  _IMAGE_URI: "asia-south1-docker.pkg.dev/YOUR_GCP_PROJECT_ID/trovia/trovia-app:latest"
  _NEXT_PUBLIC_HELA_RPC: ""
  _NEXT_PUBLIC_CHAIN_ID: ""
  _NEXT_PUBLIC_HLUSD_ADDRESS: ""
  _NEXT_PUBLIC_AGENT_REGISTRY_ADDRESS: ""
  _NEXT_PUBLIC_AGENT_ESCROW_ADDRESS: ""
  _NEXT_PUBLIC_AGENT_EXECUTOR_ADDRESS: ""
  _NEXT_PUBLIC_PLATFORM_FEE_BPS: ""
  _NEXT_PUBLIC_SUPABASE_URL: ""
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
  _NEXT_PUBLIC_GEMINI_API_KEY: ""
