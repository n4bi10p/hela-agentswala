steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_IMAGE_URI}"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_IMAGE_URI}"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--image=${_IMAGE_URI}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=1Gi"
      - "--cpu=1"
      - "--max-instances=2"
      - "--set-env-vars=NODE_ENV=production"

images:
  - "${_IMAGE_URI}"

substitutions:
  _SERVICE: "trovia-app"
  _REGION: "asia-south1"
  _IMAGE_URI: "asia-south1-docker.pkg.dev/YOUR_GCP_PROJECT_ID/trovia/trovia-app:latest"
